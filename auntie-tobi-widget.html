<!-- Auntie Tobi Widget -->
<style>
  #auntie-tobi-widget {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    text-decoration: none;
    gap: 4px;
  }
  #auntie-tobi-widget .tobi-circle {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: 3px solid #FFB81C;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(5,122,68,0.4);
    transition: transform 0.3s;
    background: white;
    position: relative;
  }
  #auntie-tobi-widget .tobi-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #auntie-tobi-widget .tobi-dot {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background: #22C55E;
    border-radius: 50%;
    border: 2px solid white;
  }
  #auntie-tobi-widget .tobi-label {
    background: #057A44;
    color: white;
    padding: 4px 10px;
    border-radius: 50px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 11px;
    box-shadow: 0 4px 12px rgba(5,122,68,0.3);
    white-space: nowrap;
  }
  #auntie-tobi-widget:hover .tobi-circle {
    transform: scale(1.05);
  }
</style>
