A: ILR (permanent residency) is usually available after 5 years on most visas. Requirements: continuous residence in the UK, pass the Life in the UK test (£50, book at gov.uk), English language proof, and no criminal record. Application fee: £2,885 (2026). Apply on gov.uk/indefinite-leave-to-remain.

--- BENEFITS & SUPPORT ---
Q: What UK benefits can Nigerians claim?
A: Eligibility depends on your visa type and National Insurance contributions. Common benefits: Universal Credit (for low-income workers/unemployed), Child Benefit (£25.60/week per child, 2026), Working Tax Credit, Housing Benefit, Council Tax Reduction. Most recent arrivals on skilled worker or student visas have "No Recourse to Public Funds" (NRPF) and cannot claim most benefits. Check your visa conditions carefully at gov.uk.

--- FOOD & LIFESTYLE ---
Q: Where can I buy Nigerian food in the UK?
A: Major Nigerian/African food shops are in: Peckham (London) — most Nigerian food shops in the UK. Dalston, Hackney, Brixton, Tottenham (all London). Handsworth (Birmingham), Moss Side (Manchester), Harehills (Leeds). Online: AfriBerry.com, Afrobasket.co.uk deliver Nigerian foodstuff nationwide. NaijaHub directory has Nigerian grocery stores near you — ask me!

Q: What are the best Nigerian restaurants in London?
A: Top picks: Ikoyi (Michelin-starred Nigerian-inspired, St James's), Chuku's (Tottenham — Nigerian tapas),805 Restaurant (Peckham), Eko Kitchen (Brixton), Yellow Chilli (Stratford). For everyday jollof and swallow, Peckham High Street has many options. Check NaijaHub's blog for the full top 10 list!

--- BUSINESS IN THE UK ---
Q: How do I start a business in the UK as a Nigerian?
A: 1) Choose your structure: Sole Trader (simple) or Limited Company (more professional). 2) Register at companieshouse.gov.uk — costs £12 online, done in 24 hours. 3) Register for Self Assessment with HMRC at gov.uk/register-for-self-assessment. 4) Open a business bank account (Tide, Monzo Business, or Starling Business are easiest). 5) Get relevant licences for your sector. 6) List your business on NaijaHub directory to reach the Nigerian community! Read our full guide at naijahub.co.uk/blog/start-business-uk-nigerian.

Q: Do I need to pay tax on my UK income as a Nigerian?
A: Yes. If you earn over £12,570/year (personal allowance 2026), you pay income tax. Rate: 20% basic rate (£12,571–£50,270), 40% higher rate (£50,271–£125,140). Self-employed Nigerians must file a Self Assessment tax return by 31 January each year. Use an accountant — NaijaHub has Nigerian accountants listed in our directory!

function detectCategory(question) {
  const q = question.toLowerCase();
  for (const [cat, keywords] of Object.entries(CATEGORIES)) {
    if (keywords.some(k => q.includes(k))) return cat;
  }
  return 'general';
}

function detectCity(question) {
  const cities = ['london','manchester','birmingham','leeds','liverpool','bristol','sheffield','nottingham','leicester','coventry','wolverhampton','bradford','edinburgh','glasgow','cardiff','reading','oxford','cambridge','brighton','southampton'];
  const q = question.toLowerCase();
  return cities.find(c => q.includes(c)) || '';
}

function isGapResponse(reply) {

  return GAP_SIGNALS.some(signal => r.includes(signal));

function formatResponse(text) {
  // Extract suggestions
  let suggestions = [];
  const sugMatch = text.match(/\[SUGGESTIONS:(.*?)\]/s);
  if (sugMatch) {
    suggestions = sugMatch[1].split('|').map(s => s.trim()).filter(Boolean);
    text = text.replace(/\[SUGGESTIONS:.*?\]/s, '').trim();
  }

  // Convert **bold** to strong
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  // Convert [text](url) markdown links to clickable anchors
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" style="color:#057A44;font-weight:600;text-decoration:underline;">$1</a>');

  // Parse affiliate cards
  text = text.replace(/\[AFFILIATES:\s*(.*?)\]/g, (match, keys) => {
    const keyList = keys.split(',').map(k => k.trim());
    return renderAffiliateCards(keyList);
  });

  // Parse result cards
  text = text.replace(/\[CARD:(.*?)\]/gs, (match, content) => {
    const lines = content.trim().split('\n').map(l => l.trim());
    let cardHTML = '<div class="result-card">';
    lines.forEach(line => {
      if (line.startsWith('TAG:')) {
        const tag = line.replace('TAG:', '').trim().toLowerCase();
        const tagClass = tag === 'directory' ? 'tag-directory' : tag === 'event' ? 'tag-event' : tag === 'guide' ? 'tag-guide' : tag === 'money' ? 'tag-money' : tag === 'church' ? 'tag-church' : 'tag-blog';
        const emoji = tag === 'directory' ? '🏢' : tag === 'event' ? '🎉' : tag === 'guide' ? '🇬🇧' : tag === 'money' ? '💸' : tag === 'church' ? '🙏' : '📰';
        cardHTML += `<span class="card-tag ${tagClass}">${emoji} ${tag}</span>`;
      } else if (line.startsWith('NAME:')) {
        cardHTML += `<div class="card-name">${line.replace('NAME:', '').trim()}</div>`;
      } else if (line.startsWith('DETAIL:')) {
        cardHTML += `<div class="card-detail">${line.replace('DETAIL:', '').trim()}</div>`;
      } else if (line.startsWith('LINK:')) {
        const url = line.replace('LINK:', '').trim();
        cardHTML += `<a class="card-link" href="https://${url}" target="_blank">View on NaijaHub →</a>`;
      }
    });
    cardHTML += '</div>';
    return cardHTML;
  });

  let html = `<div>${text.replace(/\n\n/g, '</div><div style="margin-top:8px">').replace(/\n/g, '<br>')}</div>`;

  if (suggestions.length > 0) {
    html += '<div class="suggestions">';
    suggestions.forEach(s => {
      html += `<span class="suggestion" onclick="quickAsk('${s.replace(/'/g, "\\'")}')">${s}</span>`;
    });
    html += '</div>';
  }

  return html;
}

const installBtn = document.getElementById('install-btn');
const closeBtn = document.getElementById('banner-close');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after 5 seconds
  setTimeout(() => banner.classList.add('show'), 5000);
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    banner.classList.remove('show');
  }
  deferredPrompt = null;
});

closeBtn.addEventListener('click', () => {
  banner.classList.remove('show');
});

// Hide banner if already installed
window.addEventListener('appinstalled', () => {
  banner.classList.remove('show');
});

// Handle URL query params for shortcuts
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    setTimeout(() => sendMessage(decodeURIComponent(q)), 1000);
  }
});
</script>
</body>
</html>
