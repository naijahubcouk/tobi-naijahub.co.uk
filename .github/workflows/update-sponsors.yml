name: Update Sponsor Register

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  update-sponsors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sponsor extractor
        run: node scripts/extract-sponsors.js

      - name: Commit updated sponsor list
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add netlify/functions/sponsors.json
          git diff --staged --quiet || git commit -m "chore: update sponsor register $(date +%Y-%m-%d)"
          git push
